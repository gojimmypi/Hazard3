<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="pipelineGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#003262;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00509E;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="hazardGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FDB515;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C4820E;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>

  <rect width="400" height="400" fill="#ffffff"/>

  <g id="pipeline-stages" transform="translate(200, 80)" filter="url(#shadow)">
    <path d="M -120,0 L -60,0 L -35,40 L -60,80 L -120,80 L -95,40 Z"
          fill="url(#pipelineGradient)" opacity="0.6"/>
    <path d="M -50,0 L 10,0 L 35,40 L 10,80 L -50,80 L -25,40 Z"
          fill="url(#pipelineGradient)" opacity="0.8"/>
    <path d="M 20,0 L 80,0 L 105,40 L 80,80 L 20,80 L 45,40 Z"
          fill="url(#pipelineGradient)" opacity="1"/>

    <g id="hazard-indicator">
      <path d="M -35,15 L -20,15 L -15,25 L -30,25 Z" fill="url(#hazardGradient)"/>
      <path d="M -25,35 L -10,35 L -5,45 L -20,45 Z" fill="url(#hazardGradient)"/>
      <path d="M -15,55 L 0,55 L 5,65 L -10,65 Z" fill="url(#hazardGradient)"/>
    </g>
  </g>

  <g opacity="0.4" stroke-width="3">
    <line x1="105" y1="120" x2="150" y2="120" stroke="#003262"/>
    <line x1="170" y1="120" x2="215" y2="120" stroke="#003262"/>
    <circle cx="150" cy="120" r="4" fill="#003262"/>
    <circle cx="215" cy="120" r="4" fill="#003262"/>
  </g>

  <g transform="translate(200, 240)">
    <text x="0" y="0" font-family="sans-serif" font-size="68"
          font-weight="900" fill="#003262" text-anchor="middle">Hazard</text>
    <text x="0" y="75" font-family="sans-serif" font-size="90"
          font-weight="900" fill="#FDB515" text-anchor="middle">3</text>
  </g>


</svg>
