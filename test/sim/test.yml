
simulators:
  cxxrtl_default:
    make_dir:  tb_cxxrtl
    make_args: CONFIG=default
    exec:      tb_cxxrtl/tb
    march:     rv32ima_zca_zcb_zcmp_zicsr_zifencei_zba_zbb_zbkb_zbs
  verilator_default:
    make_dir:  tb_verilator
    make_args: CONFIG=default
    exec:      tb_verilator/tb
    march:     rv32ima_zca_zcb_zcmp_zicsr_zifencei_zba_zbb_zbkb_zbs
  cxxrtl_min:
    make_dir:  tb_cxxrtl
    make_args: CONFIG=min
    exec:      tb_cxxrtl/tb-min
    march:     rv32i_zicsr_zifencei
    tests:     hellow
  cxxrtl_min_debug:
    make_dir:  tb_cxxrtl
    make_args: CONFIG=min_debug
    exec:      tb_cxxrtl/tb-min_debug
    march:     rv32i_zicsr_zifencei
    tests:     ecall_simple hellow instr_access_fault load_misalign_halfword load_misalign_word load_store_fault pmp_u_rw pmp_write_and_lock soft_irq store_misalign_halfword store_misalign_word trigger_step_m_u umode_mret umode_wfi wfi_loop 


