# Hazard3 debug on ULX4M-LD through an external Tigard FT2232H adapter.

adapter driver ftdi
ftdi vid_pid 0x0403 0x6010

# Tigard JTAG is on FT2232H channel B / USB interface 1.
ftdi channel 1
ftdi layout_init 0x0038 0x003b
ftdi layout_signal nTRST -data 0x0010
ftdi layout_signal nSRST -data 0x0020

reset_config srst_push_pull trst_push_pull
transport select jtag
adapter speed 1000

# ULX4M-LD uses an LFE5UM-85F. Its IDCODE differs from LFE5U-85F.
set _CHIPNAME lfe5um85
jtag newtap $_CHIPNAME hazard3 \
    -expected-id 0x01113043 \
    -irlen 8 \
    -irmask 0xFF \
    -ircapture 0x5

# Hazard3 exposes RISC-V DTMCS and DMI through ECP5 ER1/ER2 instructions.
set _TARGETNAME $_CHIPNAME.hazard3
target create $_TARGETNAME riscv -chain-position $_TARGETNAME
riscv set_ir dtmcs 0x32
riscv set_ir dmi 0x38

gdb_report_data_abort enable
init
halt
