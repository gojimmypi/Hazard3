# ULX4M-LD onboard FT231X bit-banged JTAG.

adapter driver ft232r
ft232r vid_pid 0x0403 0x6015

# Mandatory for OpenOCD, although the FT231X modem-control interface
# is bit-banged and does not produce a precise 1 MHz JTAG clock.
adapter speed 1000

ft232r tck_num DSR
ft232r tms_num DCD
ft232r tdi_num RI
ft232r tdo_num CTS

# Unused reset outputs must not duplicate the four JTAG assignments.
ft232r trst_num RTS
ft232r srst_num DTR

transport select jtag

# ULX4M-LD uses an ECP5 85F.
set _CHIPNAME lfe5u85

jtag newtap $_CHIPNAME hazard3 \
    -expected-id 0x41113043 \
    -irlen 8 \
    -irmask 0xFF \
    -ircapture 0x5

# Hazard3's RISC-V debug transport is exposed through the ECP5
# ER1 and ER2 private JTAG instructions.
set _TARGETNAME $_CHIPNAME.hazard3
target create $_TARGETNAME riscv -chain-position $_TARGETNAME

riscv set_ir dtmcs 0x32
riscv set_ir dmi 0x38

gdb_report_data_abort enable

init